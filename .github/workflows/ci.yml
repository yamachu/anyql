name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-dotnet:
    name: .NET Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workloads
        run: dotnet workload install wasm-tools wasm-experimental

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --settings tests/AnyQL.Tests/testcontainers.runsettings --logger "console;verbosity=normal"
        env:
          # Testcontainers needs Docker. GitHub Actions runners have Docker pre-installed.
          DOCKER_HOST: unix:///var/run/docker.sock

  build-and-test-js:
    name: Build & Test JS
    runs-on: ubuntu-latest
    needs: test-dotnet

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workloads
        run: dotnet workload install wasm-tools wasm-experimental

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        working-directory: packages/anyql-js
        run: pnpm run build

      - name: Test JS package
        run: pnpm run test:js
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Test examples
        run: pnpm run test:examples
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: "true"
